name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run test
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0.1"
          elixir-version: "1.17.3"

      - run: mix deps.get
      - run: mix test
      - run: mix phx.server > /tmp/sayless-backend.log 2>&1 &
      - run: |
          for attempt in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:4000/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/sayless-backend.log
          exit 1
        working-directory: .
      - run: ./scripts/smoke_backend_http.sh
        working-directory: .
